name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python tooling + result validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lightweight test deps
        # CI stays dependency-light on purpose (issue #4): only what the schema/report/packer
        # tooling needs. Heavy model deps (openvino, nncf, torch) are NOT imported by CI tests —
        # tests that need them skip when the import is missing.
        run: python -m pip install --upgrade pip jsonschema numpy pytest

      - name: Validate all result JSONs
        run: python scripts/validate_results.py

      - name: Check results summary is up to date
        run: python scripts/make_report.py --check

      - name: Run pytest (scripts/ + sw/)
        run: python -m pytest

  rtl:
    name: RTL lint + Verilator testbenches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Scoreboard lint + testbenches (issue #15)
        run: bash sim/scoreboard/run.sh

      - name: HyperBus controller lint + testbench (issue #13)
        run: bash sim/hyperbus/run.sh

      - name: Record-replay datapath lint + testbenches (issue #16)
        run: bash sim/replay/run.sh

      - name: L0b soft-MAC array lint + testbenches (issue #10)
        run: bash sim/microbench/l0b_soft_mac/run.sh
